<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>monkbrowse</title>
    <style>
      :root {
        --bg: #ffffff;
        --panel: #ffffff;
        --text: #17182b;
        --muted: #6b7280;
        --faint: #aeb2bd;
        --border: #ececf1;
        --hover: #f6f6fa;
        --active: #eef1fd;
        --accent: #4b57c4;
        --accent-strong: #3f4ab0;
        --chip-bg: #ecedfb;
        --chip-fg: #3a3f9e;
        --green: #1a8f3c;
        --sw-off: #d6d7de;
        --scroll: #e2e2e8;
        --warn-bg: #fff4e5;
        --warn-fg: #9a6400;
        --grad: linear-gradient(90deg, #e9a294, #a2abde 68%, #88b2ec);
        --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, monospace;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #16171f;
          --panel: #1c1d27;
          --text: #e8e9f0;
          --muted: #9a9fad;
          --faint: #666b78;
          --border: #2a2b37;
          --hover: #20212c;
          --active: #262a41;
          --accent: #8b93ec;
          --accent-strong: #a0a7f0;
          --chip-bg: #2b2e4a;
          --chip-fg: #bcc3ff;
          --green: #3fce6a;
          --sw-off: #3a3c4a;
          --scroll: #33343f;
          --warn-bg: #332810;
          --warn-fg: #e6b566;
        }
      }
      * { box-sizing: border-box; }
      html, body { margin: 0; background: var(--bg); overflow: hidden; }
      body {
        width: 400px;
        max-height: 600px;
        display: flex;
        flex-direction: column;
        font: 13px/1.5 -apple-system, "Segoe UI", Roboto, system-ui, sans-serif;
        color: var(--text);
        -webkit-font-smoothing: antialiased;
      }
      header, .head, .ctx, .bar, .hint, .tip, details.conn { flex: none; }

      header { display: flex; align-items: center; gap: 9px; padding: 15px 16px 10px; }
      header img { width: 22px; height: 22px; }
      .brand { font-size: 15px; font-weight: 650; letter-spacing: -0.01em; flex: 1; }
      .stat { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
      .stat .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--faint); }
      .stat.live { color: var(--green); }
      .stat.live .dot { background: var(--green); box-shadow: 0 0 0 3px color-mix(in srgb, var(--green) 16%, transparent); }

      .head { display: flex; align-items: center; gap: 6px; padding: 2px 16px 8px; }
      .head .t { font-size: 13px; font-weight: 650; }
      .head .c { margin-left: auto; font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }

      .info { display: inline-grid; place-items: center; width: 16px; height: 16px; border: 0; padding: 0; background: transparent; color: var(--faint); cursor: pointer; border-radius: 50%; flex: none; }
      .info:hover { color: var(--accent); }
      .info:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }

      .ctx { display: flex; align-items: center; gap: 8px; margin: 0 16px 8px; padding: 9px 11px; border-radius: 9px; font-size: 12px; }
      .ctx .msg { flex: 1; min-width: 0; }
      .ctx.acting { background: var(--active); color: var(--text); }
      /* Offline notice: extra bottom margin sets it apart from the tab list below. */
      .ctx.warn { background: var(--warn-bg); color: var(--warn-fg); margin-bottom: 16px; flex-wrap: wrap; }
      .ctx b { font-weight: 650; }
      .ctxlink { flex: none; border: 0; background: transparent; color: inherit; font: inherit; font-weight: 700; text-decoration: underline; text-underline-offset: 2px; cursor: pointer; padding: 0; white-space: nowrap; }
      .ctxlink:hover { opacity: 0.82; }
      .ctxlink:focus-visible { outline: 2px solid currentColor; outline-offset: 2px; border-radius: 4px; }
      .pulse { flex: none; width: 8px; height: 8px; border-radius: 50%; background: var(--green); animation: pulse 1.1s ease-in-out infinite; }
      @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.82); } }

      .bar { display: flex; align-items: center; gap: 8px; padding: 0 16px 8px; }
      .search { flex: 1; display: flex; align-items: center; gap: 7px; background: var(--hover); border: 1px solid var(--border); border-radius: 9px; padding: 8px 10px; }
      .search svg { flex: none; color: var(--faint); }
      .search input { border: 0; background: transparent; outline: none; font: inherit; color: var(--text); width: 100%; }
      .search input::placeholder { color: var(--faint); }
      .search:focus-within { border-color: var(--accent); background: var(--panel); }
      .clearbtn { flex: none; display: grid; place-items: center; width: 18px; height: 18px; border: 0; border-radius: 50%; background: var(--faint); color: var(--panel); cursor: pointer; padding: 0; }
      .clearbtn:hover { background: var(--muted); }
      .clearbtn:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }
      .linkbtn { flex: none; border: 0; background: transparent; color: var(--accent); font: inherit; font-weight: 600; font-size: 12px; cursor: pointer; padding: 4px 2px; border-radius: 6px; }
      .linkbtn:hover { text-decoration: underline; }
      .linkbtn:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }

      .hint { margin: 0 16px 8px; font-size: 12px; color: var(--muted); }

      .tip { display: flex; align-items: flex-start; gap: 8px; margin: 0 16px 10px; padding: 9px 11px; border-radius: 9px; font-size: 12px; background: var(--active); color: var(--text); }
      .tip .tip-txt { flex: 1; }
      .tip b { font-weight: 700; }
      .tip-x { flex: none; border: 0; background: transparent; color: var(--muted); cursor: pointer; font-size: 15px; line-height: 1; padding: 0 2px; border-radius: 4px; }
      .tip-x:hover { color: var(--text); }
      .tip-x:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }

      .list { flex: 1 1 auto; min-height: 0; overflow-y: auto; padding: 0 8px 6px; }
      .list::-webkit-scrollbar { width: 8px; }
      .list::-webkit-scrollbar-thumb { background: var(--scroll); border-radius: 8px; }
      .noresult { color: var(--muted); font-size: 13px; padding: 16px; text-align: center; }

      .group { padding: 12px 8px 4px; font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: var(--faint); }
      .group:first-child { padding-top: 4px; }

      .row {
        display: grid; grid-template-columns: 24px 1fr auto; align-items: center; gap: 11px;
        width: 100%; text-align: left; border: 0; background: transparent; color: inherit;
        padding: 9px 8px; border-radius: 11px; cursor: pointer; font: inherit;
        transition: background 0.15s ease, box-shadow 0.15s ease;
      }
      .row:hover { background: var(--hover); }
      .row.active { background: var(--active); }
      .row.acting { background: var(--active); box-shadow: inset 0 0 0 1.5px var(--accent); }
      .row:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }

      .fav { width: 18px; height: 18px; justify-self: center; border-radius: 4px; object-fit: contain; }
      .fav.blank { padding: 1px; color: var(--faint); }

      .meta { min-width: 0; }
      .title { font-size: 13.5px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .sub { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
      .host { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .live-dot { flex: none; width: 6px; height: 6px; border-radius: 50%; background: var(--green); }

      .end { display: flex; align-items: center; gap: 7px; }
      .num { font: 700 11px var(--mono); color: var(--chip-fg); background: var(--chip-bg); border-radius: 6px; padding: 2px 5px; cursor: help; }
      .go { flex: none; display: grid; place-items: center; width: 24px; height: 24px; border: 0; border-radius: 7px; background: transparent; color: var(--muted); cursor: pointer; opacity: 0; transition: opacity 0.12s ease, background 0.12s ease; }
      .row:hover .go, .row:focus-within .go { opacity: 1; }
      .go:hover { background: var(--active); color: var(--accent); }
      .go:focus-visible { opacity: 1; outline: 2px solid var(--accent); outline-offset: 1px; }
      .sw { position: relative; width: 38px; height: 22px; border-radius: 999px; background: var(--sw-off); flex: none; transition: background 0.18s ease; }
      .sw::after { content: ""; position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; border-radius: 50%; background: #fff; box-shadow: 0 1px 2px rgba(20,16,28,0.28); transition: transform 0.18s ease; }
      .row[aria-pressed="true"] .sw { background: var(--grad); }
      .row[aria-pressed="true"] .sw::after { transform: translateX(16px); }

      details.conn { border-top: 1px solid var(--border); }
      details.conn > summary { list-style: none; cursor: pointer; padding: 11px 16px; font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 7px; }
      details.conn > summary:hover { color: var(--text); }
      details.conn > summary::-webkit-details-marker { display: none; }
      .caret { transition: transform 0.15s ease; flex: none; }
      details.conn[open] .caret { transform: rotate(90deg); }
      details.conn > summary b { color: var(--text); font-weight: 600; }
      details.conn > summary .info { margin-left: auto; }
      .conn-body { padding: 2px 16px 15px; }
      .fields { display: flex; gap: 9px; }
      .field { display: flex; flex-direction: column; gap: 5px; }
      .field.port { width: 84px; flex: none; }
      .field.grow { flex: 1; }
      label { font-size: 11px; font-weight: 600; color: var(--muted); }
      input.txt { font: inherit; color: var(--text); background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 8px 9px; width: 100%; }
      input.txt:focus-visible { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 20%, transparent); }
      button.save { margin-top: 11px; width: 100%; cursor: pointer; color: #fff; font: inherit; font-weight: 600; border: 0; border-radius: 8px; padding: 9px; background: var(--accent); transition: background 0.15s ease; }
      button.save:hover { background: var(--accent-strong); }
      .saved { height: 14px; margin-top: 7px; text-align: center; font-size: 11px; color: var(--green); opacity: 0; transition: opacity 0.15s; }
      .saved.show { opacity: 1; }
      .conn-note { margin: 9px 0 0; font-size: 11px; color: var(--muted); line-height: 1.5; }
      .conn-note a { color: var(--accent); text-decoration: none; }
      .conn-note a:hover { text-decoration: underline; }

      @media (prefers-reduced-motion: reduce) { *, .pulse { transition: none !important; animation: none !important; } }
    </style>
  </head>
  <body>
    <header>
      <img src="/icon/48.png" alt="" />
      <span class="brand">monkbrowse</span>
      <span class="stat" id="stat" title="Connection to the local monkbrowse server">
        <span class="dot"></span><span id="statText">…</span>
      </span>
    </header>

    <div class="head">
      <span class="t">Tabs the AI can use</span>
      <button class="info" type="button" data-doc="/guide/sharing" title="What does sharing mean?" aria-label="Learn about sharing tabs">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true"><circle cx="8" cy="8" r="6.4" stroke="currentColor" stroke-width="1.3"/><path d="M8 7v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="4.9" r="0.9" fill="currentColor"/></svg>
      </button>
      <span class="c" id="count"></span>
    </div>

    <div class="ctx" id="ctx" hidden></div>

    <div class="bar" id="bar" hidden>
      <span class="search">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.6"/><path d="M11 11l3.5 3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        <input id="search" type="text" placeholder="Search tabs" aria-label="Search tabs" />
        <button id="clear" class="clearbtn" type="button" hidden aria-label="Clear search" title="Clear search">
          <svg width="9" height="9" viewBox="0 0 10 10" fill="none" aria-hidden="true"><path d="M1 1l8 8M9 1l-8 8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        </button>
      </span>
      <button id="shareAll" class="linkbtn" type="button"></button>
    </div>

    <p class="hint" id="hint" hidden>Flip a tab on to let the AI use it.</p>

    <div class="tip" id="tip" hidden>
      <span class="tip-txt">Nice — that tab is now <b>#1</b>. Tell your AI <b>“use tab 1”</b> to point it here.</span>
      <button class="tip-x" id="tipClose" type="button" aria-label="Dismiss tip">×</button>
    </div>

    <div id="list" class="list" role="list"></div>

    <details class="conn">
      <summary>
        <svg class="caret" width="9" height="9" viewBox="0 0 8 8" fill="none" aria-hidden="true"><path d="M2 1l4 3-4 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Connection <span id="connSummary"></span>
        <button class="info" type="button" data-doc="/guide/connection" title="Ports & profiles explained" aria-label="Learn about connections and profiles">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true"><circle cx="8" cy="8" r="6.4" stroke="currentColor" stroke-width="1.3"/><path d="M8 7v4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="8" cy="4.9" r="0.9" fill="currentColor"/></svg>
        </button>
      </summary>
      <div class="conn-body">
        <div class="fields">
          <div class="field port">
            <label for="port">Port</label>
            <input id="port" class="txt" type="number" min="1" max="65535" inputmode="numeric" />
          </div>
          <div class="field grow">
            <label for="label">Name (optional)</label>
            <input id="label" class="txt" type="text" placeholder="Work, Personal…" />
          </div>
        </div>
        <button id="save" class="save">Save &amp; reconnect</button>
        <div id="saved" class="saved">Reconnecting…</div>
        <p class="conn-note">One port per Chrome profile (9222, 9223…). The extension connects on its own; only change this to run a second profile. <a data-doc="/guide/connection" href="#">Learn more</a></p>
      </div>
    </details>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
