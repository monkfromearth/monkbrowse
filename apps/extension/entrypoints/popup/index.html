<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Monkbrowse</title>
    <style>
      :root { color-scheme: light dark; }
      body { font: 13px/1.5 system-ui, sans-serif; width: 260px; margin: 0; padding: 14px; }
      h1 { font-size: 14px; margin: 0; }
      .head { display: flex; align-items: center; gap: 8px; margin: 0 0 12px; }
      .head img { width: 22px; height: 22px; border-radius: 6px; }
      .row { display: flex; justify-content: space-between; margin: 6px 0; }
      .muted { opacity: 0.65; }
      .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; margin-right: 6px; vertical-align: middle; }
      .on { background: #16a34a; } .off { background: #9ca3af; }
      button { font: inherit; padding: 6px 10px; margin-top: 10px; width: 100%; cursor: pointer; }
      a { color: inherit; }
    </style>
  </head>
  <body>
    <div class="head"><img src="/icon/48.png" alt="" /><h1>Monkbrowse</h1></div>
    <div class="row"><span>Status</span><span id="status"><span class="dot off"></span>…</span></div>
    <div class="row"><span>Profile</span><span id="label" class="muted">—</span></div>
    <div class="row"><span>Port</span><span id="port" class="muted">—</span></div>
    <button id="reconnect">Reconnect</button>
    <button id="settings">Settings…</button>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
